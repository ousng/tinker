# .github/workflows/build-wheel.yml
name: Build Wheel

# 允许你从 GitHub 网页手动触发此工作流
on:
  workflow_dispatch:
    inputs:
      commit_hash:
        description: 'Commit hash to build from'
        required: true
        default: 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_hash }}

      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # 根据你的需求调整版本

      # 3. 安装构建依赖
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      # 4. 构建 Wheel
      - name: Build wheel
        run: python -m build --wheel

      # 5. 上传 Wheel 作为 Artifacts
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-wheels
          path: dist/*.whl
